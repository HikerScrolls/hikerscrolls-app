<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HikerScrolls</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shared/auth.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

  <!-- APP SHELL: sidebar + main -->
  <div id="app" class="app-shell">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <div>
            <h1 class="sidebar-title" id="sidebar-title">HikerScrolls</h1>
            <p class="sidebar-subtitle" id="sidebar-subtitle">Travel stories &amp; trail maps</p>
          </div>
          <div class="sidebar-header-actions">
            <span id="auth-btn"></span>
            <button id="lang-toggle" class="sidebar-icon-btn" title="Switch Language"></button>
            <button id="sidebar-settings" class="sidebar-icon-btn" title="Settings">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <button id="sidebar-collapse" class="sidebar-icon-btn sidebar-collapse" aria-label="Close sidebar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="sidebar-create">
        <button id="create-trip-btn" class="create-trip-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          Create New Trip
        </button>
      </div>

      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Search trips..." class="search-input" />
      </div>

      <div class="sidebar-sort">
        <button class="sort-btn active" data-sort="date" id="sort-date">Newest</button>
        <button class="sort-btn" data-sort="name" id="sort-name">A-Z</button>
        <button class="sort-btn" data-sort="distance" id="sort-distance">Distance</button>
      </div>

      <div id="trip-list" class="trip-list"></div>

      <div class="sidebar-footer">
        <span class="sidebar-footer-text" id="trip-count"></span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="main-content">
      <!-- Global map (default view) -->
      <div id="global-map" class="global-map"></div>

      <!-- Trip view (hidden initially) — all templates render here -->
      <div id="trip-view" class="hj-root hj-v5" style="display:none"></div>
    </main>

  </div>

  <!-- SIDEBAR TOGGLE (outside app-shell to avoid Leaflet z-index conflicts) -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Open sidebar">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="18" height="2.5" rx="1" fill="#1e293b"/>
      <rect y="5.5" width="18" height="2.5" rx="1" fill="#1e293b"/>
      <rect y="11" width="18" height="2.5" rx="1" fill="#1e293b"/>
    </svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/auth.js"></script>
  <script src="souvenir-core.js"></script>
  <script src="app.js"></script>
  <script>HikerAuth.init();</script>
</body>
</html>
